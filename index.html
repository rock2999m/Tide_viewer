<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1e3a8a" />
  <title>Tide Chart Viewer</title>
  <link rel="manifest" href="./manifest.json" />
  <style>
    :root {
      --bg: #0b1d4a;
      --bg2: #1e3a8a;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #3b82f6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .app {
      width: min(960px, 100%);
      background: var(--card);
      border-radius: 14px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.25);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
      color: #fff;
      padding: 18px 20px;
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
    }

    .header p {
      margin: 4px 0 0;
      font-size: 13px;
      opacity: 0.9;
    }

    .content {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .panel {
      border: 1px solid #dbe3f0;
      border-radius: 10px;
      padding: 14px;
      background: #f8fafc;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 15px;
      color: #1e3a8a;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      display: block;
      margin-bottom: 6px;
    }

    input[type="date"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 15px;
    }

    .viewer {
      aspect-ratio: 16 / 9;
      border-radius: 10px;
      background: #000;
      color: #fff;
      display: grid;
      place-items: center;
      min-height: 220px;
      font-size: 14px;
      text-align: center;
      padding: 10px;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .controls {
      display: grid;
      gap: 10px;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .row button {
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .row button.secondary {
      background: #0ea5a4;
    }

    #debug {
      margin: 0;
      max-height: 180px;
      overflow: auto;
      font-size: 12px;
      background: #111827;
      color: #cbd5e1;
      border-radius: 8px;
      padding: 10px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>Tide Chart Viewer</h1>
      <p>GitHub 実装用の新規プロジェクトひな形</p>
    </header>

    <section class="content">
      <div class="panel">
        <h2>日付選択</h2>
        <label for="datePicker">表示基準日</label>
        <input id="datePicker" type="date" />
        <p class="muted">ここから先は手動実装向け。既存フォルダ内の他アプリファイルには依存していません。</p>
      </div>

      <div class="panel">
        <h2>ビューア</h2>
        <div id="viewer" class="viewer">画像表示領域（未実装）</div>
      </div>

      <div class="panel controls">
        <h2>操作</h2>
        <div class="row">
          <button id="btnLoad">読み込み</button>
          <button class="secondary" id="btnClear">ログクリア</button>
        </div>
        <pre id="debug"></pre>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
